name: Tests

on:
  pull_request:
  push:
    branches:
      - master
      - "v*"
      - "dev"
  schedule:
    - cron: '0 0 * * *' # every day at midnight
  workflow_dispatch:

jobs:
  test-stuff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      # need to do this before we start the services as they need the TLS creds
      - name: Create test certs for TLS
        run: |
          make test-certs
          chmod 777 ./contrib/tls/*

      - name: Create _data folder
        run: | 
          mkdir -p ./_data/appendonlydir
          chmod -R a+rX ./_data/appendonlydir

      - name: Start services
        run: docker compose up -d
        working-directory: ./

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: go mod tidy

      - name: Docker logs
        run: |
          echo "${{ toJson(job) }}"
          docker ps -a
          echo "ok"

      - name: Run tests
        env:
          LOG_LEVEL: "info"
        run: |
          sleep 15
          make test


      - name: Run tests - redis 8
        env:
          LOG_LEVEL: "info"
          TEST_REDIS_URI: "redis://localhost:16388"
          TEST_PWD_REDIS_URI: "redis://:redis-password@localhost:16380"
        run: |
          go test -v -race -p 1 ./...


      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        continue-on-error: true
        with:
          fail_ci_if_error: fa;se
          files: ./coverage.txt
          token: ${{ secrets.CODECOV_TOKEN }} # required
          verbose: true

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2
        continue-on-error: true
        with:
          file: coverage.txt

      - name: Stop services
        if: always()
        run: docker compose down
        working-directory: ./


  lint-stuff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.11.2
          args: "--tests=false"

      - name: Run checks
        env:
          LOG_LEVEL: "info"
        run: |
          make checks


  build-stuff:
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.26'

      - name: Install Dependencies
        run: go mod tidy

      - name: Build some binaries
        run: make build-some-amd64-binaries

      - name: Generate mixin
        run: make mixin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Test Docker Image Build - Alpine (push to local registry)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          target: alpine
          tags: localhost:5000/redis_exporter:alpine-test
          file: Dockerfile
          build-args: "GOARCH=amd64"

      - name: Test Docker Image Build - Scratch (push to local registry)
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          push: true
          target: scratch-release
          tags: localhost:5000/redis_exporter:scratch-test
          file: Dockerfile
          build-args: "GOARCH=amd64"

      - name: Scan Alpine image with Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: localhost:5000/redis_exporter:alpine-test
          fail-build: true
          severity-cutoff: high
          only-fixed: true

      - name: Scan Scratch image with Grype
        uses: anchore/scan-action@1638637db639e0ade3258b51db49a9a137574c3e # v6
        with:
          image: localhost:5000/redis_exporter:scratch-test
          fail-build: true
          severity-cutoff: high
          only-fixed: true
